<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>250M Game</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="250M Game">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #ff6b35;
            --secondary: #004e89;
            --accent: #ffd60a;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --success: #06d6a0;
            --danger: #ef476f;
            --border-radius: 16px;
            --shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        html { font-size: 16px; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #2d3561 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 3px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle { font-size: 0.9rem; color: #aaa; margin-top: 4px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .player-card {
            background: linear-gradient(135deg, rgba(0,78,137,0.15), rgba(255,107,53,0.15));
            border: 2px solid rgba(255,107,53,0.3);
            border-radius: var(--border-radius);
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        .player-card.active {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255,107,53,0.4);
            transform: translateY(-5px);
        }

        .player-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-badge {
            display: inline-block;
            background: var(--primary);
            color: var(--dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .player-stats { display: flex; gap: 20px; margin-top: 20px; }

        .stat { flex: 1; }

        .stat-label {
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--accent); }

        .players-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }

        .players-list-title {
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .player-item-name { flex: 1; }

        .auction-section {
            background: rgba(0,78,137,0.2);
            border: 2px solid var(--secondary);
            border-radius: var(--border-radius);
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
        }

        .auction-header { text-align: center; margin-bottom: 40px; }

        .auction-title {
            font-size: 1.2rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .player-auction { text-align: center; margin-bottom: 40px; }

        .player-name-large {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideIn 0.5s ease-out;
        }

        .current-bid {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--success);
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .bid-label { font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .auction-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        /* Robot thinking indicator */
        .robot-thinking {
            text-align: center;
            padding: 20px;
            color: var(--accent);
            font-size: 1.1rem;
            font-style: italic;
            display: none;
        }

        .robot-thinking.visible { display: block; }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }

        .btn {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .btn:hover::before { left: 100%; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #ff8c5a);
            color: white;
            box-shadow: 0 8px 24px rgba(255,107,53,0.3);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,107,53,0.4); }

        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: rgba(239,71,111,0.2);
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        .btn-secondary:hover:not(:disabled) { background: var(--danger); color: white; transform: translateY(-2px); }

        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            overflow-y: auto;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: linear-gradient(135deg, var(--dark), #2d3561);
            border: 2px solid var(--primary);
            border-radius: var(--border-radius);
            padding: 50px;
            max-width: 700px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 20px;
        }

        .modal-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-message { font-size: 1.2rem; color: #aaa; margin-bottom: 40px; line-height: 1.6; }

        .modal-teams {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            text-align: left;
        }

        .modal-team { margin-bottom: 25px; }
        .modal-team:last-child { margin-bottom: 0; }

        .modal-team-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; color: var(--accent); }

        .modal-team-players { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        .modal-player { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .modal-player-name { font-size: 0.8rem; color: #aaa; text-align: center; max-width: 70px; line-height: 1.2; }

        .btn-restart {
            background: var(--success);
            color: var(--dark);
            font-size: 1.1rem;
            padding: 16px 40px;
            margin-top: 20px;
        }

        .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(6,214,160,0.3); }

        /* SETUP MODAL */
        .setup-modal-content {
            max-width: 480px;
            width: 100%;
        }

        .setup-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,107,53,0.4);
            border-radius: 10px;
            color: #f8f9fa;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .setup-input:focus { border-color: var(--primary); }

        .setup-label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .setup-group { margin-bottom: 22px; text-align: left; }

        /* Mode selector */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
        }

        .mode-btn {
            flex: 1;
            padding: 14px 10px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,107,53,0.3);
            border-radius: 12px;
            color: #f8f9fa;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
        }

        .mode-btn:hover { border-color: var(--primary); background: rgba(255,107,53,0.1); }

        .mode-btn.selected {
            border-color: var(--primary);
            background: rgba(255,107,53,0.2);
            color: var(--accent);
        }

        .mode-btn .mode-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }

        /* Slider */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .slider-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            min-width: 32px;
            text-align: center;
        }

        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,107,53,0.3);
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,107,53,0.5);
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        /* ANIMATIONS */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.8); }
            50%  { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .pulse { animation: pulse 0.6s ease-in-out; }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            html { height: 100%; overflow: hidden; }

            body {
                height: 100%;
                min-height: unset;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            header { padding: 10px 14px; flex-shrink: 0; }
            h1 { font-size: 1.3rem; }
            .subtitle { font-size: 0.7rem; }

            .container {
                padding: 10px;
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow: hidden;
            }

            .players-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-bottom: 0;
                flex-shrink: 0;
            }

            .player-card { padding: 10px; border-radius: 10px; }
            .player-card.active { transform: none; box-shadow: 0 0 14px rgba(255,107,53,0.5); }

            .player-name { font-size: 0.85rem; margin-bottom: 8px; gap: 6px; flex-wrap: wrap; }
            .player-badge { font-size: 0.65rem; padding: 2px 7px; }
            .player-stats { gap: 8px; margin-top: 8px; }
            .stat-label { font-size: 0.65rem; margin-bottom: 3px; }
            .stat-value { font-size: 1.1rem; }

            .players-list { margin-top: 8px; max-height: 90px; overflow-y: auto; }
            .players-list-title { font-size: 0.65rem; margin-bottom: 5px; }
            .player-item { padding: 5px 7px; font-size: 0.72rem; margin-bottom: 4px; border-radius: 5px; }

            .auction-section {
                flex: 1;
                min-height: 0;
                padding: 10px 14px;
                margin-bottom: 0;
                border-radius: 12px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }

            .auction-header { margin-bottom: 10px; }
            .auction-title { font-size: 0.85rem; margin-bottom: 0; letter-spacing: 1px; }
            .player-auction { margin-bottom: 14px; }
            .player-name-large { font-size: 1.6rem; margin-bottom: 8px; }
            .current-bid { font-size: 2.2rem; margin-bottom: 4px; }
            .bid-label { font-size: 0.75rem; }

            .auction-controls { flex-direction: row; gap: 10px; margin-top: 14px; width: 100%; }
            .btn { flex: 1; padding: 14px 6px; font-size: 0.85rem; }

            #startBtn { width: 100%; margin-top: 0; }

            .modal-content { padding: 24px 16px; margin: 12px; }
            .modal-title { font-size: 1.8rem; }
            .modal-message { font-size: 1rem; margin-bottom: 20px; }
            .modal-teams { padding: 16px; margin-bottom: 20px; }
            .modal-player-name { max-width: 80px; font-size: 0.75rem; }
            .modal-team-players { justify-content: flex-start; gap: 10px; }

            .setup-modal-content { padding: 24px 16px !important; }
            .mode-btn { padding: 10px 6px; font-size: 0.8rem; }
            .mode-btn .mode-icon { font-size: 1.3rem; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1><span style="-webkit-text-fill-color:initial;color:initial;">⚽</span> 250M GAME</h1>
                <p class="subtitle">Le jeu d'enchères</p>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- PLAYERS SECTION -->
        <div class="players-grid">
            <div class="player-card" id="player1Card">
                <div class="player-name">
                    👤 <span id="player1NameDisplay">Joueur 1</span>
                    <span class="player-badge" id="player1Badge">En attente</span>
                </div>
                <div class="player-stats">
                    <div class="stat">
                        <div class="stat-label">Budget</div>
                        <div class="stat-value" id="player1Money">250M€</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Équipe</div>
                        <div class="stat-value" id="player1Team">0/4</div>
                    </div>
                </div>
                <div class="players-list">
                    <div class="players-list-title">Joueurs acquis</div>
                    <div id="player1Players"></div>
                </div>
            </div>

            <div class="player-card" id="player2Card">
                <div class="player-name">
                    🤖 <span id="player2NameDisplay">Joueur 2</span>
                    <span class="player-badge" id="player2Badge">En attente</span>
                </div>
                <div class="player-stats">
                    <div class="stat">
                        <div class="stat-label">Budget</div>
                        <div class="stat-value" id="player2Money">250M€</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Équipe</div>
                        <div class="stat-value" id="player2Team">0/4</div>
                    </div>
                </div>
                <div class="players-list">
                    <div class="players-list-title">Joueurs acquis</div>
                    <div id="player2Players"></div>
                </div>
            </div>
        </div>

        <!-- AUCTION SECTION -->
        <div class="auction-section" id="auctionSection" style="display: none;">
            <div class="auction-header">
                <div class="auction-title">Enchère en cours</div>
            </div>

            <div class="player-auction">
                <div class="player-name-large" id="playerNameAuction">-</div>
                <div class="current-bid" id="currentBid">0M€</div>
                <div class="bid-label">Enchère actuelle</div>
            </div>

            <div class="robot-thinking" id="robotThinking">🤖 Le robot réfléchit<span class="dots"></span></div>

            <div class="auction-controls">
                <button class="btn btn-primary" id="biddBtn">Enchérir (+10M€)</button>
                <button class="btn btn-secondary" id="passBtn">Passer</button>
            </div>
        </div>

        <!-- START GAME BUTTON -->
        <div style="text-align: center;">
            <button class="btn btn-primary" id="startBtn" style="font-size:1.2rem;padding:16px 40px;">Commencer le jeu</button>
        </div>
    </div>

    <!-- MODAL GAME OVER -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Partie terminée ⚽</div>
            <div class="modal-teams" id="modalTeams"></div>
            <button class="btn btn-restart" id="restartBtn">Rejouer</button>
        </div>
    </div>

    <!-- MODAL SETUP -->
    <div class="modal show" id="setupModal">
        <div class="modal-content setup-modal-content">
            <div class="modal-title" style="font-size:2rem;margin-bottom:24px;">⚽ 250M Game</div>

            <!-- MODE -->
            <div class="setup-group">
                <label class="setup-label">Mode de jeu</label>
                <div class="mode-selector">
                    <div class="mode-btn selected" id="modeBtn1v1" onclick="selectMode('1v1')">
                        <span class="mode-icon">👥</span>
                        1 contre 1
                    </div>
                    <div class="mode-btn" id="modeBtnRobot" onclick="selectMode('robot')">
                        <span class="mode-icon">🤖</span>
                        Contre le robot
                    </div>
                </div>
            </div>

            <hr class="divider">

            <!-- PRÉNOMS -->
            <div class="setup-group">
                <label class="setup-label">🔴 Prénom Joueur 1</label>
                <input id="nameInput1" class="setup-input" type="text" placeholder="Prénom..." />
            </div>
            <div class="setup-group" id="nameGroup2">
                <label class="setup-label">🔵 Prénom Joueur 2</label>
                <input id="nameInput2" class="setup-input" type="text" placeholder="Prénom..." />
            </div>

            <hr class="divider">

            <!-- TAILLE D'ÉQUIPE -->
            <div class="setup-group">
                <label class="setup-label">Joueurs par équipe</label>
                <div class="slider-row">
                    <span>2</span>
                    <input type="range" id="teamSizeSlider" min="2" max="6" value="4" oninput="updateSliderDisplay(this.value)">
                    <span>6</span>
                    <span class="slider-value" id="sliderDisplay">4</span>
                </div>
            </div>

            <button class="btn btn-primary" id="confirmSetupBtn" style="width:100%;font-size:1rem;padding:14px;margin-top:8px;">Confirmer</button>
        </div>
    </div>

            { name: 'Randal Kolo Muani' },
            { name: 'Mason Greenwood' },
            { name: 'Bradley Barcola' },
            { name: 'Michael Olise' },
            { name: 'Cole Palmer' },
        ];

        // === CONFIGURATION ===
        const config = {
            mode: '1v1',   // '1v1' ou 'robot'
            teamSize: 4,
        };

        const playerNames = { p1: 'Joueur 1', p2: 'Joueur 2' };

        // === ÉTAT DU JEU ===
        const game = {
            player1: { money: 250, team: [] },
            player2: { money: 250, team: [] },
            starterNextRound: null,
            currentSpeaker: null,
            currentAuctionPlayer: null,
            currentBid: 0,
            lastBidder: null,
            gameActive: false,
            shuffledPlayers: [],
            pickIndex: 0,
            manche: 0,
            mancheEnCours: false,
        };

        // === DOM ===
        const setupModal     = document.getElementById('setupModal');
        const confirmSetupBtn= document.getElementById('confirmSetupBtn');
        const nameInput1     = document.getElementById('nameInput1');
        const nameInput2     = document.getElementById('nameInput2');
        const nameGroup2     = document.getElementById('nameGroup2');
        const startBtn       = document.getElementById('startBtn');
        const auctionSection = document.getElementById('auctionSection');
        const player1Card    = document.getElementById('player1Card');
        const player2Card    = document.getElementById('player2Card');
        const biddBtn        = document.getElementById('biddBtn');
        const passBtn        = document.getElementById('passBtn');
        const gameOverModal  = document.getElementById('gameOverModal');
        const restartBtn     = document.getElementById('restartBtn');
        const robotThinking  = document.getElementById('robotThinking');

        // === SETUP MODAL ===
        function selectMode(mode) {
            config.mode = mode;
            document.getElementById('modeBtn1v1').classList.toggle('selected', mode === '1v1');
            document.getElementById('modeBtnRobot').classList.toggle('selected', mode === 'robot');
            // Cacher/montrer le champ Joueur 2 si robot
            nameGroup2.style.display = mode === 'robot' ? 'none' : '';
            // Mettre à jour l'icône joueur 2
            document.querySelector('#player2Card .player-name').childNodes[0].textContent = mode === 'robot' ? '🤖 ' : '👤 ';
        }

        function updateSliderDisplay(val) {
            document.getElementById('sliderDisplay').textContent = val;
        }

        confirmSetupBtn.addEventListener('click', () => {
            const n1 = nameInput1.value.trim();
            if (!n1) { alert('Merci de saisir ton prénom !'); return; }
            if (config.mode === '1v1') {
                const n2 = nameInput2.value.trim();
                if (!n2) { alert('Merci de saisir le prénom du Joueur 2 !'); return; }
                playerNames.p2 = n2;
            } else {
                playerNames.p2 = 'Robot';
            }
            playerNames.p1 = n1;
            config.teamSize = parseInt(document.getElementById('teamSizeSlider').value);
            updatePlayerNamesUI();
            setupModal.classList.remove('show');
        });

        nameInput1.addEventListener('keydown', e => { if (e.key === 'Enter') { if (config.mode === '1v1') nameInput2.focus(); else confirmSetupBtn.click(); } });
        nameInput2.addEventListener('keydown', e => { if (e.key === 'Enter') confirmSetupBtn.click(); });

        function updatePlayerNamesUI() {
            document.getElementById('player1NameDisplay').textContent = playerNames.p1;
            document.getElementById('player2NameDisplay').textContent = playerNames.p2;
            const icon2 = config.mode === 'robot' ? '🤖 ' : '👤 ';
            document.querySelector('#player2Card .player-name').firstChild.textContent = icon2;
        }

        // === UTILITAIRES ===
        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // === DÉMARRAGE ===
        startBtn.addEventListener('click', startGame);
        biddBtn.addEventListener('click', () => bid());
        passBtn.addEventListener('click', () => pass());
        restartBtn.addEventListener('click', restartGame);

        function startGame() {
            const ts = config.teamSize;
            game.player1 = { money: 250, team: [] };
            game.player2 = { money: 250, team: [] };
            game.starterNextRound = Math.random() < 0.5 ? 1 : 2;
            game.gameActive = true;
            game.shuffledPlayers = shuffleArray(PLAYERS_FOOTBALL);
            game.pickIndex = 0;
            game.manche = 0;
            game.mancheEnCours = false;

            // Mettre à jour l'affichage /N selon teamSize
            document.getElementById('player1Team').textContent = '0/' + ts;
            document.getElementById('player2Team').textContent = '0/' + ts;

            startBtn.style.display = 'none';
            auctionSection.style.display = 'block';
            newManche();
        }

        // === ROBOT IA ===
        // Stratégie : calcule un prix max acceptable basé sur le budget restant
        // et le nombre de joueurs qu'il reste à acquérir. Ajoute une légère variance.
        function robotDecide() {
            const ts = config.teamSize;
            const robotMoney  = game.player2.money;
            const robotTeam   = game.player2.team;
            const remaining   = ts - robotTeam.length; // joueurs qu'il reste au robot à acheter
            if (remaining <= 0) return 'pass';

            // Budget idéalement réparti sur les joueurs restants
            const avgBudgetPerPlayer = robotMoney / remaining;

            // Prix max que le robot accepte de payer : une fraction de la moyenne
            // Il réserve au moins 10M€ par joueur futur (sauf si c'est le dernier)
            const reservePerFuture = remaining > 1 ? 10 : 0;
            const totalReserve     = reservePerFuture * (remaining - 1);
            const spendable        = robotMoney - totalReserve;
            const maxBid           = Math.min(spendable, avgBudgetPerPlayer * (0.9 + Math.random() * 0.4));

            const nextBid = game.currentBid + 10;

            // Contrainte budget
            if (robotMoney < nextBid) return 'pass';

            // Le robot ne dépasse pas son prix max (avec un peu de hasard pour qu'il ne soit pas trop prévisible)
            if (nextBid > maxBid) return 'pass';

            return 'bid';
        }

        function scheduleRobotTurn() {
            if (!game.mancheEnCours) return;
            if (game.currentSpeaker !== 2) return;
            if (config.mode !== 'robot') return;

            robotThinking.classList.add('visible');
            biddBtn.disabled = true;
            passBtn.disabled = true;

            const delay = 800 + Math.random() * 700; // 0.8s à 1.5s de "réflexion"
            setTimeout(() => {
                robotThinking.classList.remove('visible');
                if (!game.mancheEnCours) return;
                const decision = robotDecide();
                if (decision === 'bid') {
                    bid(true);
                } else {
                    pass();
                }
            }, delay);
        }

        // === LOGIQUE D'ENCHÈRE ===
        function bid(isRobot = false) {
            if (!game.mancheEnCours) return;
            const ts = config.teamSize;
            const requiredBid  = game.currentBid + 10;
            const bidderMoney  = game.currentSpeaker === 1 ? game.player1.money : game.player2.money;

            if (bidderMoney < requiredBid) {
                if (!isRobot) alert('Budget insuffisant pour enchérir !');
                return;
            }

            const myTeam      = game.currentSpeaker === 1 ? game.player1.team : game.player2.team;
            const isLastTurn  = myTeam.length >= ts - 1;
            const opponentFull= (game.currentSpeaker === 1 ? game.player2.team : game.player1.team).length >= ts;
            const isOpeningBid= game.currentBid === 0;

            if (!isLastTurn && !opponentFull && !isOpeningBid && bidderMoney - requiredBid < 10) {
                if (!isRobot) alert('Vous devez garder au moins 10M€ en réserve !');
                return;
            }

            game.currentBid   = requiredBid;
            game.lastBidder   = game.currentSpeaker;

            const nextSpeaker = game.currentSpeaker === 1 ? 2 : 1;
            const nextTeam    = nextSpeaker === 1 ? game.player1.team : game.player2.team;

            if (nextTeam.length >= ts) {
                pass();
                return;
            }

            game.currentSpeaker = nextSpeaker;
            updateUI();

            // Si c'est au robot de jouer maintenant
            if (config.mode === 'robot' && game.currentSpeaker === 2 && game.mancheEnCours) {
                scheduleRobotTurn();
            }
        }

        function pass() {
            if (!game.mancheEnCours) return;
            game.mancheEnCours = false;
            robotThinking.classList.remove('visible');

            const ts = config.teamSize;
            let winner = game.lastBidder;
            let price  = game.currentBid;

            if (winner === 1 && game.player1.team.length >= ts) { winner = 2; price = 0; }
            else if (winner === 2 && game.player2.team.length >= ts) { winner = 1; price = 0; }

            if (winner === 1) {
                game.player1.team.push(game.currentAuctionPlayer);
                game.player1.money -= price;
            } else {
                game.player2.team.push(game.currentAuctionPlayer);
                game.player2.money -= price;
            }

            updateUI();

            const total = game.player1.team.length + game.player2.team.length;
            if (total >= ts * 2) {
                endGame();
            } else {
                game.starterNextRound = game.starterNextRound === 1 ? 2 : 1;
                setTimeout(newManche, 1500);
            }
        }

        function newManche() {
            if (game.mancheEnCours) return;
            game.mancheEnCours = true;
            game.manche++;

            const ts           = config.teamSize;
            const randomPlayer = game.shuffledPlayers[game.pickIndex++];
            game.currentAuctionPlayer = randomPlayer;
            game.currentBid    = 0;
            game.lastBidder    = null;
            game.currentSpeaker= game.starterNextRound;

            // Si un joueur est plein, l'autre récupère gratuitement sans enchère
            if (game.player1.team.length >= ts && game.player2.team.length < ts) {
                game.player2.team.push(randomPlayer);
                const total = game.player1.team.length + game.player2.team.length;
                game.mancheEnCours = false;
                if (total >= ts * 2) { endGame(); return; }
                game.starterNextRound = game.starterNextRound === 1 ? 2 : 1;
                setTimeout(newManche, 800);
                return;
            }
            if (game.player2.team.length >= ts && game.player1.team.length < ts) {
                game.player1.team.push(randomPlayer);
                const total = game.player1.team.length + game.player2.team.length;
                game.mancheEnCours = false;
                if (total >= ts * 2) { endGame(); return; }
                game.starterNextRound = game.starterNextRound === 1 ? 2 : 1;
                setTimeout(newManche, 800);
                return;
            }

            // Si l'ouvreur n'a pas 10M, l'autre ouvre
            const openerMoney = game.currentSpeaker === 1 ? game.player1.money : game.player2.money;
            if (openerMoney < 10) {
                game.currentSpeaker = game.currentSpeaker === 1 ? 2 : 1;
            }

            updateUI();

            // Si c'est le robot qui ouvre
            if (config.mode === 'robot' && game.currentSpeaker === 2 && game.mancheEnCours) {
                scheduleRobotTurn();
            }
        }

        function updateUI() {
            const ts = config.teamSize;

            document.getElementById('player1Money').textContent = game.player1.money + 'M€';
            document.getElementById('player1Team').textContent  = game.player1.team.length + '/' + ts;
            document.getElementById('player1Badge').textContent = game.player1.team.length >= ts ? 'Complet' : 'Actif';

            const p1Items = game.player1.team.map(p =>
                `<div class="player-item"><span class="player-item-name">${p.name}</span></div>`
            ).join('');
            document.getElementById('player1Players').innerHTML = p1Items || '<div class="player-item">Aucun joueur</div>';

            document.getElementById('player2Money').textContent = game.player2.money + 'M€';
            document.getElementById('player2Team').textContent  = game.player2.team.length + '/' + ts;
            document.getElementById('player2Badge').textContent = game.player2.team.length >= ts ? 'Complet' : 'Actif';

            const p2Items = game.player2.team.map(p =>
                `<div class="player-item"><span class="player-item-name">${p.name}</span></div>`
            ).join('');
            document.getElementById('player2Players').innerHTML = p2Items || '<div class="player-item">Aucun joueur</div>';

            document.getElementById('playerNameAuction').textContent = game.currentAuctionPlayer.name;
            document.getElementById('currentBid').textContent        = game.currentBid + 'M€';

            // Boutons — désactivés si c'est au robot de jouer
            const isRobotTurn = config.mode === 'robot' && game.currentSpeaker === 2;
            const speakerMoney= game.currentSpeaker === 1 ? game.player1.money : game.player2.money;
            const requiredBid = game.currentBid + 10;

            const speakerFull  = (game.currentSpeaker === 1 ? game.player1.team : game.player2.team).length >= ts;
            const myTeam       = game.currentSpeaker === 1 ? game.player1.team : game.player2.team;
            const isLastTurn   = myTeam.length >= ts - 1;
            const opponentFull = (game.currentSpeaker === 1 ? game.player2.team : game.player1.team).length >= ts;
            const isOpeningBid = game.currentBid === 0;
            const wouldGoBelowMin = !isLastTurn && !opponentFull && !isOpeningBid && (speakerMoney - requiredBid < 10);
            const canBid  = speakerMoney >= requiredBid && !speakerFull && !wouldGoBelowMin;
            const canPass = game.lastBidder !== null && game.lastBidder !== game.currentSpeaker;

            biddBtn.disabled = !canBid || isRobotTurn;
            passBtn.disabled = !canPass || isRobotTurn;

            const bidBlockReason = speakerFull ? ' - Équipe complète'
                : speakerMoney < requiredBid ? ' - Budget insuffisant'
                : wouldGoBelowMin ? ' - Garde 10M€ min' : '';
            biddBtn.textContent = `Enchérir (+10M€)${bidBlockReason}`;

            // Auto-switch si personne ne peut jouer (mode 1v1 seulement)
            if (!canBid && !canPass && !isRobotTurn) {
                const other       = game.currentSpeaker === 1 ? 2 : 1;
                const otherMoney  = other === 1 ? game.player1.money : game.player2.money;
                const otherFull   = (other === 1 ? game.player1.team : game.player2.team).length >= ts;
                const otherCanBid = otherMoney >= requiredBid && !otherFull;
                const otherCanPass= game.lastBidder !== null && game.lastBidder !== other;
                if (otherCanBid || otherCanPass) {
                    setTimeout(() => {
                        game.currentSpeaker = other;
                        updateUI();
                        if (config.mode === 'robot' && game.currentSpeaker === 2) scheduleRobotTurn();
                    }, 600);
                }
            }

            // Highlight
            player1Card.classList.toggle('active', game.currentSpeaker === 1);
            player2Card.classList.toggle('active', game.currentSpeaker === 2);

            auctionSection.classList.remove('pulse');
            void auctionSection.offsetWidth;
            auctionSection.classList.add('pulse');
        }

        function endGame() {
            game.gameActive = false;
            auctionSection.style.display = 'none';
            robotThinking.classList.remove('visible');

            const teamsHTML = `
                <div class="modal-team">
                    <div class="modal-team-title">🔴 Équipe ${playerNames.p1}</div>
                    <div class="modal-team-players">
                        ${game.player1.team.map(p => `<div class="modal-player"><span class="modal-player-name">${p.name}</span></div>`).join('')}
                    </div>
                </div>
                <div class="modal-team">
                    <div class="modal-team-title">${config.mode === 'robot' ? '🤖' : '🔵'} Équipe ${playerNames.p2}</div>
                    <div class="modal-team-players">
                        ${game.player2.team.map(p => `<div class="modal-player"><span class="modal-player-name">${p.name}</span></div>`).join('')}
                    </div>
                </div>
            `;

            document.getElementById('modalTeams').innerHTML = teamsHTML;
            gameOverModal.classList.add('show');
        }

        function restartGame() {
            gameOverModal.classList.remove('show');
            auctionSection.style.display = 'none';
            startBtn.style.display = '';
            startGame();
        }

        // === PWA ===
        const manifestData = {
            name: "250M Game", short_name: "250M", start_url: ".",
            display: "standalone", background_color: "#1a1a2e", theme_color: "#1a1a2e",
            icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='75' x='10' font-size='75'>⚽</text></svg>", sizes: "192x192", type: "image/svg+xml" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
        const manifestURL  = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel   = 'manifest';
        manifestLink.href  = manifestURL;
        document.head.appendChild(manifestLink);

        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response(''))));`;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: '/' }).catch(() => {});
        }
    </script>
</body>
</html>
